# WPFolks Quality Workflow
#
# Runs PHPCS (WordPress-Extra) and, when applicable, `composer audit`
# on every push and reports the results back to your WPFolks profile
# so the WPCS Compliant + Security Audit Clean badges auto-award.
#
# Composer is not required. If your repo has no composer.json, only
# the PHPCS scan runs; the security scan is skipped (Composer audit
# needs declared dependencies to evaluate).
#
# Setup:
#   1. Save at .github/workflows/wpfolks-quality.yml in your repo.
#   2. In Settings → Secrets and variables → Actions, add the secret
#      WPFOLKS_TOKEN, value copied from /settings/?tab=github.
#   3. Push a commit. The workflow runs and posts results.

name: WPFolks Quality

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          # pcov is required for the coverage step. Faster than
          # xdebug and skipped silently if PHPUnit doesn't run.
          coverage: pcov

      - name: Install PHPCS + WPCS (global)
        run: |
          # Composer 2.2+ blocks plugins unless explicitly allowed.
          # WPCS pulls in dealerdirect/phpcodesniffer-composer-installer
          # which auto-registers the WPCS standard with PHPCS — useful,
          # but a plugin, so it needs the allowlist entry.
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true

          composer global require --no-interaction --quiet \
            squizlabs/php_codesniffer \
            wp-coding-standards/wpcs \
            phpcsstandards/phpcsutils \
            phpcsstandards/phpcsextra

          PHPCS_BIN="$(composer global config bin-dir --absolute --quiet)/phpcs"
          GLOBAL_HOME="$(composer global config home --absolute --quiet)"

          # The composer plugin above usually wires up installed_paths
          # automatically when it sees the WPCS standard installed,
          # but set it explicitly as a fallback in case the plugin
          # didn't run.
          $PHPCS_BIN --config-set installed_paths \
            $GLOBAL_HOME/vendor/wp-coding-standards/wpcs,$GLOBAL_HOME/vendor/phpcsstandards/phpcsutils,$GLOBAL_HOME/vendor/phpcsstandards/phpcsextra

          echo "PHPCS_BIN=$PHPCS_BIN" >> "$GITHUB_ENV"

      - name: Run PHPCS (WordPress-Extra)
        id: phpcs
        continue-on-error: true
        run: |
          set +e
          "$PHPCS_BIN" --standard=WordPress-Extra \
            --extensions=php --report=summary . > phpcs-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run Composer Audit (only if composer.json present)
        id: audit
        if: ${{ hashFiles('composer.json') != '' }}
        continue-on-error: true
        run: |
          set +e
          composer audit --format=plain > audit-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          echo "ran=true" >> "$GITHUB_OUTPUT"

      - name: Run PHPStan (only if phpstan config present)
        id: phpstan
        if: ${{ hashFiles('phpstan.neon', 'phpstan.neon.dist') != '' }}
        continue-on-error: true
        run: |
          set +e
          composer global require --no-interaction --quiet phpstan/phpstan
          PHPSTAN_BIN="$(composer global config bin-dir --absolute --quiet)/phpstan"
          $PHPSTAN_BIN analyze --no-progress --error-format=raw > phpstan-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          echo "ran=true" >> "$GITHUB_OUTPUT"

      - name: Install project deps for PHPUnit (only if phpunit config + composer present)
        id: project_install
        if: ${{ hashFiles('phpunit.xml', 'phpunit.xml.dist') != '' && hashFiles('composer.json') != '' }}
        continue-on-error: true
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit with coverage (only if phpunit config present)
        id: coverage
        if: ${{ hashFiles('phpunit.xml', 'phpunit.xml.dist') != '' }}
        continue-on-error: true
        run: |
          set +e
          # pcov is faster than xdebug for coverage; setup-php
          # ships with pcov available via the `coverage` input.
          if [ -f vendor/bin/phpunit ]; then
            PHPUNIT_BIN=vendor/bin/phpunit
          else
            composer global require --no-interaction --quiet phpunit/phpunit
            PHPUNIT_BIN="$(composer global config bin-dir --absolute --quiet)/phpunit"
          fi
          $PHPUNIT_BIN --coverage-text=phpunit-coverage.txt > phpunit-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          echo "ran=true" >> "$GITHUB_OUTPUT"

      - name: Report to WPFolks
        if: always()
        env:
          WPFOLKS_TOKEN: ${{ secrets.WPFOLKS_TOKEN }}
        run: |
          # PHPCS exit code 0 = pass; anything else (errors, warnings) = fail.
          PHPCS_PASSED=false
          [ "${{ steps.phpcs.outputs.exit_code }}" = "0" ] && PHPCS_PASSED=true

          # Build the reports array via jq so escaping is correct
          # regardless of what PHPCS / audit emitted.
          PHPCS_DETAILS=$(head -c 4000 phpcs-output.txt 2>/dev/null || echo "")
          REPORTS=$(jq -n \
            --argjson p $PHPCS_PASSED \
            --arg d "$PHPCS_DETAILS" \
            '[{scan_type:"phpcs", passed:$p, score:(if $p then 100 else 0 end), details:$d}]')

          # Append security report only if `composer audit` ran.
          if [ "${{ steps.audit.outputs.ran }}" = "true" ]; then
            AUDIT_PASSED=false
            [ "${{ steps.audit.outputs.exit_code }}" = "0" ] && AUDIT_PASSED=true
            AUDIT_DETAILS=$(head -c 4000 audit-output.txt 2>/dev/null || echo "")
            REPORTS=$(echo "$REPORTS" | jq \
              --argjson p $AUDIT_PASSED \
              --arg d "$AUDIT_DETAILS" \
              '. += [{scan_type:"security", passed:$p, score:(if $p then 100 else 0 end), details:$d}]')
          fi

          # 1.22.209 — Append static-analysis report only if PHPStan ran.
          if [ "${{ steps.phpstan.outputs.ran }}" = "true" ]; then
            PHPSTAN_PASSED=false
            [ "${{ steps.phpstan.outputs.exit_code }}" = "0" ] && PHPSTAN_PASSED=true
            PHPSTAN_DETAILS=$(head -c 4000 phpstan-output.txt 2>/dev/null || echo "")
            REPORTS=$(echo "$REPORTS" | jq \
              --argjson p $PHPSTAN_PASSED \
              --arg d "$PHPSTAN_DETAILS" \
              '. += [{scan_type:"phpstan", passed:$p, score:(if $p then 100 else 0 end), details:$d}]')
          fi

          # 1.22.209 — Append coverage report only if PHPUnit+coverage ran.
          # Coverage badge requires >=80% line coverage. Parse the
          # "Lines:" summary from --coverage-text output.
          if [ "${{ steps.coverage.outputs.ran }}" = "true" ]; then
            COV_PCT=0
            if [ -f phpunit-coverage.txt ]; then
              # Match "Lines:   N.NN%"
              COV_PCT=$(grep -E '^\s*Lines:' phpunit-coverage.txt | head -1 | grep -oE '[0-9]+(\.[0-9]+)?%' | head -1 | tr -d '%')
              COV_PCT=${COV_PCT%.*}  # round down to integer
              [ -z "$COV_PCT" ] && COV_PCT=0
            fi
            COV_PASSED=false
            [ "$COV_PCT" -ge 80 ] && COV_PASSED=true
            COV_DETAILS=$(head -c 4000 phpunit-coverage.txt 2>/dev/null || echo "")
            REPORTS=$(echo "$REPORTS" | jq \
              --argjson p $COV_PASSED \
              --argjson s $COV_PCT \
              --arg d "$COV_DETAILS" \
              '. += [{scan_type:"coverage", passed:$p, score:$s, details:$d}]')
          fi

          PAYLOAD=$(jq -n \
            --argjson r "$REPORTS" \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            '{repo_full_name:$repo, commit_sha:$sha, reports:$r}')

          curl --fail-with-body -sS -X POST "https://wpfolks.org/wp-json/wpfolks/v1/github/quality" \
            -H "Authorization: Bearer $WPFOLKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"